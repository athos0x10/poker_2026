server.port=8082

# --- Connexion à la base de données (H2 en mémoire) ---
spring.datasource.url=jdbc:h2:mem:pokerdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# --- Configuration JPA / Hibernate ---
# Hibernate crée les tables automatiquement à partir de tes classes @Entity
spring.jpa.hibernate.ddl-auto=update
# Affiche les requêtes SQL dans la console (super pour le débuggage)
spring.jpa.show-sql=true
# Formate le SQL pour qu'il soit lisible
spring.jpa.properties.hibernate.format_sql=true

# --- Console H2 (Interface Web) ---
# Permet d'accéder à http://localhost:8080/h2-console
spring.h2.console.enabled=true
# Empêche les problèmes de sécurité avec les frames sur Mac/Chrome
spring.h2.console.settings.web-allow-others=false